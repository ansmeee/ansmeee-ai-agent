server:
  port: 8080
  mode: debug  # debug | release | test

llm:
  provider: deepseek
  api_key: ""
  base_url: https://api.deepseek.com
  model: deepseek-chat
  temperature: 0.7
  max_tokens: 4096
  timeout: 60s

mysql:
  master:
    host: 127.0.0.1
    port: 3306
    user: root
    password: ""
    database: ai_agent
  slave:
    host: 127.0.0.1
    port: 3306
    user: root
    password: ""
    database: ai_agent

redis:
  addr: localhost:6379
  password: ""
  db: 0
  max_retries: 3
  pool_size: 10

milvus:
  address: localhost:19530
  username: ""
  password: ""
  dbname: default
  collection: embeddings
  text_max_length: 65535

memory:
  type: mysql  # memory | mysql | redis
  ttl: 30m
  max_messages: 100

agent:
  max_iterations: 5            # Max ReAct loop iterations per request (1-10)
  tool_timeout: 30s            # Single tool execution timeout
  max_output_length: 4096      # Max tool output chars (truncated if exceeded)
  parallel_tool_calls: true    # Allow parallel tool execution
  max_context_messages: 50     # Max history messages in context window
