server:
  port: 8080
  mode: debug  # debug | release | test

llm:
  provider: deepseek
  api_key: ""
  base_url: https://api.deepseek.com
  model: deepseek-chat
  temperature: 0.7
  max_tokens: 4096
  timeout: 60s

mysql:
  master:
    host: 127.0.0.1
    port: 3306
    user: root
    password: ""
    database: ai_agent
  slave:
    host: 127.0.0.1
    port: 3306
    user: root
    password: ""
    database: ai_agent

redis:
  addr: localhost:6379
  password: ""
  db: 0
  max_retries: 3
  pool_size: 10

memory:
  type: mysql  # memory | mysql | redis
  ttl: 30m
  max_messages: 100
