<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent 详情</title>
<style>
  :root {
    --bg: #f5f5f7; --surface: #ffffff; --accent: #2563eb; --accent-hover: #1d4ed8;
    --text: #1e1e2e; --text-secondary: #6b7280; --border: #e5e7eb;
    --shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-inner { max-width: 1024px; width: 100%; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 18px; font-weight: 700; }
  .topbar a { font-size: 14px; color: var(--text-secondary); text-decoration: none; }
  .topbar a:hover { color: var(--accent); }

  .content { max-width: 1024px; margin: 0 auto; padding: 32px 24px; display: flex; gap: 24px; min-height: calc(100vh - 56px); }

  .sidebar { width: 240px; flex-shrink: 0; display: flex; flex-direction: column; gap: 16px; }
  .info-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; box-shadow: var(--shadow); }
  .info-card .agent-name { font-size: 18px; font-weight: 700; margin-bottom: 12px; word-break: break-word; }
  .info-card .info-row { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; display: flex; gap: 6px; }
  .info-card .info-row:last-child { margin-bottom: 0; }
  .info-card .info-label { flex-shrink: 0; font-weight: 500; }
  .info-card .info-value { word-break: break-all; }
  .sidebar-actions { display: flex; flex-direction: column; gap: 8px; }
  .btn { font-size: 13px; padding: 8px 20px; border-radius: 8px; cursor: pointer; border: none; font-weight: 500; transition: background .15s; text-align: center; text-decoration: none; display: block; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-outline { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: #fff; border: 1px solid #fca5a5; color: #dc2626; }
  .btn-danger:hover { background: #fef2f2; }

  .main { flex: 1; min-width: 0; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; box-shadow: var(--shadow); }
  .panel h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .panel .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .panel label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
  .panel input, .panel textarea { font-size: 14px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; outline: none; font-family: inherit; }
  .panel textarea { resize: vertical; min-height: 80px; }
  .panel input:focus, .panel textarea:focus { border-color: var(--accent); }
  .panel .hint { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .panel .save-row { display: flex; gap: 8px; align-items: center; }
  .panel .save-row .saved-hint { font-size: 12px; color: #16a34a; opacity: 0; transition: opacity .2s; }
  .panel .save-row .saved-hint.show { opacity: 1; }

  /* tool checkbox list */
  .tools-list { display: flex; flex-direction: column; gap: 6px; }
  .tool-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: border-color .15s; }
  .tool-item:hover { border-color: var(--accent); }
  .tool-item.checked { background: #eef2ff; border-color: var(--accent); }
  .tool-item input[type="checkbox"] { margin-top: 2px; accent-color: var(--accent); }
  .tool-item .tool-info { flex: 1; }
  .tool-item .tool-name { font-size: 13px; font-weight: 600; }
  .tool-item .tool-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  /* model config */
  .model-config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .model-config-grid .form-group { margin-bottom: 0; }
  .range-row { display: flex; align-items: center; gap: 10px; }
  .range-row input[type="range"] { flex: 1; accent-color: var(--accent); }
  .range-row .range-value { font-size: 13px; font-weight: 500; min-width: 32px; text-align: right; }

  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 10px 24px; border-radius: 10px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.show { opacity: 1; }

  .loading { text-align: center; padding: 60px 0; color: var(--text-secondary); font-size: 14px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <h1 id="pageTitle">Agent 详情</h1>
    <a href="/agents">← 返回列表</a>
  </div>
</div>

<div class="content">
  <div class="sidebar">
    <div class="info-card">
      <div class="agent-name" id="infoName">-</div>
      <div class="info-row"><span class="info-label">ID</span><span class="info-value" id="infoId">-</span></div>
      <div class="info-row"><span class="info-label">创建</span><span class="info-value" id="infoCreated">-</span></div>
      <div class="info-row"><span class="info-label">更新</span><span class="info-value" id="infoUpdated">-</span></div>
    </div>
    <div class="sidebar-actions">
      <a class="btn btn-outline" id="chatLink" href="#">开始对话</a>
      <button class="btn btn-danger" onclick="deleteAgent()">删除 Agent</button>
    </div>
  </div>

  <div class="main">
    <div class="panel">
      <h2>基础信息</h2>
      <div class="form-group">
        <label>名称</label>
        <input id="agentTitle" maxlength="50" placeholder="Agent 名称">
      </div>
      <div class="form-group">
        <label>描述</label>
        <textarea id="agentDesc" maxlength="200" rows="2" placeholder="简短描述此 Agent 的功能"></textarea>
        <div class="hint">最多 200 字</div>
      </div>
      <div class="form-group">
        <label>系统提示词 (Prompt)</label>
        <textarea id="agentPrompt" rows="10" placeholder="定义 Agent 的行为和角色"></textarea>
        <div class="hint">Agent 的系统提示词，决定其行为方式和回答风格</div>
      </div>

      <div class="form-group">
        <label>可用工具</label>
        <div class="tools-list" id="toolsList">
          <div style="font-size:12px;color:var(--text-secondary);">加载中...</div>
        </div>
        <div class="hint">选择此 Agent 可调用的工具</div>
      </div>

      <h2 style="margin-top:24px;">模型参数</h2>
      <div class="model-config-grid">
        <div class="form-group">
          <label>Temperature</label>
          <div class="range-row">
            <input type="range" id="cfgTemp" min="0" max="2" step="0.1" value="0.7" oninput="document.getElementById('cfgTempVal').textContent=this.value">
            <span class="range-value" id="cfgTempVal">0.7</span>
          </div>
          <div class="hint">越高越有创造性 (0-2)</div>
        </div>
        <div class="form-group">
          <label>Max Tokens</label>
          <input type="number" id="cfgMaxTokens" min="1" max="32000" value="1024" placeholder="1024">
          <div class="hint">最大输出 token 数</div>
        </div>
        <div class="form-group">
          <label>最大迭代次数</label>
          <select id="cfgMaxIter" style="font-size:14px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;outline:none;">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5" selected>5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
          <div class="hint">工具调用最大循环次数</div>
        </div>
      </div>

      <div class="save-row" style="margin-top:20px;">
        <button class="btn btn-primary" onclick="saveAgent()">保存修改</button>
        <span class="saved-hint" id="savedHint">已保存</span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
if (!localStorage.getItem('token')) {
  window.location.replace('/login');
  throw new Error('redirect');
}

const apiBase = '/api/v1';
const token = localStorage.getItem('token') || '';
const authHeaders = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

let redirecting = false;
async function authFetch(url, opts = {}) {
  opts.headers = { ...authHeaders, ...(opts.headers || {}) };
  const r = await fetch(url, opts);
  if (r.status === 401) {
    if (!redirecting) {
      redirecting = true;
      localStorage.removeItem('token');
      window.location.replace('/login');
    }
    throw new Error('unauthorized');
  }
  return r;
}

const params = new URLSearchParams(window.location.search);
const agentId = params.get('id');
if (!agentId) { window.location.href = '/agents'; }

let currentAgent = null;
let availableTools = [];

window.onload = async () => {
  await loadTools();
  try {
    const r = await authFetch(apiBase + '/agents/' + agentId);
    const d = await r.json();
    if (d.code !== 0 || !d.data) {
      showToast('Agent 不存在');
      setTimeout(() => window.location.href = '/agents', 1500);
      return;
    }
    currentAgent = d.data;
    fillForm(currentAgent);
  } catch (e) {
    showToast('加载失败');
  }
};

async function loadTools() {
  try {
    const r = await authFetch(apiBase + '/tools');
    const d = await r.json();
    availableTools = d.data?.tools || [];
    renderToolsList([]);
  } catch(e) {
    availableTools = [];
  }
}

function renderToolsList(selectedTools) {
  const list = document.getElementById('toolsList');
  if (availableTools.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text-secondary);">暂无可用工具</div>';
    return;
  }
  const selected = new Set(selectedTools || []);
  list.innerHTML = availableTools.map(t => {
    const checked = selected.has(t.name);
    return `<label class="tool-item${checked ? ' checked' : ''}" onclick="setTimeout(()=>toggleToolItem(this),0)">
      <input type="checkbox" name="agent_tool" value="${t.name}" ${checked ? 'checked' : ''}>
      <div class="tool-info">
        <div class="tool-name">${escapeHtml(t.name)}</div>
        <div class="tool-desc">${escapeHtml(t.description || '')}</div>
      </div>
    </label>`;
  }).join('');
}

function toggleToolItem(el) {
  const cb = el.querySelector('input[type="checkbox"]');
  el.classList.toggle('checked', cb.checked);
}

function getSelectedTools() {
  return Array.from(document.querySelectorAll('input[name="agent_tool"]:checked')).map(cb => cb.value);
}

function escapeHtml(s) { const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }

function fillForm(a) {
  document.getElementById('pageTitle').textContent = a.title || 'Agent 详情';
  document.getElementById('infoName').textContent = a.title || '-';
  document.getElementById('infoId').textContent = a.id ? a.id.slice(0, 12) + '...' : '-';
  document.getElementById('infoCreated').textContent = fmtDate(a.created_at);
  document.getElementById('infoUpdated').textContent = fmtDate(a.updated_at);
  document.getElementById('chatLink').href = '/chat?agent_id=' + a.id;
  document.getElementById('agentTitle').value = a.title || '';
  document.getElementById('agentDesc').value = a.description || '';
  document.getElementById('agentPrompt').value = a.prompt || '';

  // Tools
  renderToolsList(a.tools || []);

  // Model config
  const mc = a.model_config || {};
  const temp = mc.temperature != null ? mc.temperature : 0.7;
  document.getElementById('cfgTemp').value = temp;
  document.getElementById('cfgTempVal').textContent = temp;
  document.getElementById('cfgMaxTokens').value = mc.max_tokens || 1024;
  document.getElementById('cfgMaxIter').value = a.max_iterations || 5;
}

async function saveAgent() {
  const title = document.getElementById('agentTitle').value.trim();
  const description = document.getElementById('agentDesc').value.trim();
  const prompt = document.getElementById('agentPrompt').value.trim();
  if (!title) { showToast('请填写名称'); return; }
  if (!prompt) { showToast('请填写系统提示词'); return; }

  const tools = getSelectedTools();
  const temperature = parseFloat(document.getElementById('cfgTemp').value);
  const maxTokens = parseInt(document.getElementById('cfgMaxTokens').value) || 1024;
  const maxIterations = parseInt(document.getElementById('cfgMaxIter').value) || 5;

  const body = {
    title, description, prompt, tools,
    model_config: { temperature, max_tokens: maxTokens },
    max_iterations: maxIterations
  };

  try {
    const r = await authFetch(apiBase + '/agents/' + agentId, {
      method: 'PUT',
      headers: authHeaders,
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (d.code === 0) {
      currentAgent = d.data;
      fillForm(currentAgent);
      showToast('保存成功');
    } else {
      showToast(d.message || '保存失败');
    }
  } catch(e) {}
}

async function deleteAgent() {
  if (!currentAgent) return;
  if (!confirm('确认删除 "' + currentAgent.title + '"？删除后不可恢复。')) return;
  try {
    const r = await authFetch(apiBase + '/agents/' + agentId, { method: 'DELETE' });
    const d = await r.json();
    if (d.code === 0 || d.data?.deleted) {
      window.location.href = '/agents';
    } else {
      showToast(d.message || '删除失败');
    }
  } catch(e) {}
}

function fmtDate(s) { if (!s) return '-'; const d = new Date(s); return d.toLocaleDateString() + ' ' + d.toLocaleTimeString().slice(0, 5); }

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}
</script>
</body>
</html>
