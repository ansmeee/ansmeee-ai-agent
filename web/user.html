<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户中心</title>
<style>
  :root {
    --bg: #f5f5f7; --surface: #ffffff; --accent: #2563eb; --accent-hover: #1d4ed8;
    --text: #1e1e2e; --text-secondary: #6b7280; --border: #e5e7eb;
    --shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-inner { max-width: 1024px; width: 100%; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 18px; font-weight: 700; }
  .topbar a { font-size: 14px; color: var(--text-secondary); text-decoration: none; }
  .topbar a:hover { color: var(--accent); }

  .content { max-width: 1024px; margin: 0 auto; padding: 32px 24px; display: flex; gap: 24px; min-height: calc(100vh - 56px); }
  .sidebar { width: 200px; flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; }
  .sidebar .menu-item {
    padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 14px;
    color: var(--text-secondary); transition: background .1s; border: none; background: none; text-align: left;
  }
  .sidebar .menu-item:hover { background: #eef2ff; color: var(--accent); }
  .sidebar .menu-item.active { background: #eef2ff; color: var(--accent); font-weight: 600; }

  .main { flex: 1; min-width: 0; }
  .panel { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; box-shadow: var(--shadow); }
  .panel.active { display: block; }
  .panel h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .panel .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .panel label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
  .panel input { font-size: 14px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; outline: none; }
  .panel input:focus { border-color: var(--accent); }
  .panel .hint { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .btn { font-size: 13px; padding: 8px 20px; border-radius: 8px; cursor: pointer; border: none; font-weight: 500; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .model-section { margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .model-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .model-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 10px 24px; border-radius: 10px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <h1>用户中心</h1>
    <a href="/agents">← 返回 Agent 管理</a>
  </div>
</div>

<div class="content">
  <div class="sidebar">
    <button class="menu-item active" data-panel="model">模型配置</button>
    <button class="menu-item" data-panel="about">关于</button>
  </div>

  <div class="main">
    <!-- 模型配置 -->
    <div class="panel active" id="panel-model">
      <h2>模型配置</h2>

      <!-- 对话模型 -->
      <div class="model-section">
        <h3>对话模型</h3>
        <div class="form-group">
          <label>Model</label>
          <input id="chatModel" placeholder="例如: deepseek-chat">
          <div class="hint">对话模型名称，如 deepseek-chat、gpt-4o 等</div>
        </div>
        <div class="form-group">
          <label>Base URL</label>
          <input id="chatBaseURL" placeholder="例如: https://api.deepseek.com">
          <div class="hint">API 端点地址</div>
        </div>
        <div class="form-group">
          <label>Token</label>
          <input id="chatToken" type="password" placeholder="API Token">
          <div class="hint">API 访问密钥</div>
        </div>
        <button class="btn btn-primary" onclick="saveModelConfig(1)">保存对话模型配置</button>
      </div>

      <!-- Embedding 模型 -->
      <div class="model-section">
        <h3>Embedding 模型</h3>
        <div class="form-group">
          <label>Model</label>
          <input id="embeddingModel" placeholder="例如: text-embedding-v3">
          <div class="hint">Embedding 模型名称，如 text-embedding-v3、text-embedding-ada-002 等</div>
        </div>
        <div class="form-group">
          <label>Base URL</label>
          <input id="embeddingBaseURL" placeholder="例如: https://api.deepseek.com">
          <div class="hint">API 端点地址</div>
        </div>
        <div class="form-group">
          <label>Token</label>
          <input id="embeddingToken" type="password" placeholder="API Token">
          <div class="hint">API 访问密钥</div>
        </div>
        <button class="btn btn-primary" onclick="saveModelConfig(2)">保存 Embedding 模型配置</button>
      </div>
    </div>

    <!-- 关于 -->
    <div class="panel" id="panel-about">
      <h2>关于</h2>
      <p style="font-size:14px;color:var(--text-secondary);line-height:1.6;">
        AI Agent 是一个基于 LangChainGo + Gin 的智能助手平台。<br>
        支持自定义 Agent、会话管理、模型配置等功能。
      </p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
if (!localStorage.getItem('token')) {
  window.location.replace('/login');
  throw new Error('redirect');
}

const apiBase = '/api/v1';
const token = localStorage.getItem('token') || '';
const authHeaders = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

let redirecting = false;
async function authFetch(url, opts = {}) {
  opts.headers = { ...authHeaders, ...(opts.headers || {}) };
  const r = await fetch(url, opts);
  if (r.status === 401) {
    if (!redirecting) {
      redirecting = true;
      localStorage.removeItem('token');
      window.location.replace('/login');
    }
    throw new Error('unauthorized');
  }
  return r;
}

// Sidebar menu switching.
document.querySelectorAll('.menu-item').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.menu-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
  });
});

// Load current config on page load.
window.onload = async () => {
  try {
    const r = await authFetch(apiBase + '/user/model');
    const d = await r.json();
    if (d.data) {
      if (d.data.chat) {
        document.getElementById('chatModel').value = d.data.chat.model || '';
        document.getElementById('chatBaseURL').value = d.data.chat.base_url || '';
        document.getElementById('chatToken').value = d.data.chat.token || '';
      }
      if (d.data.embedding) {
        document.getElementById('embeddingModel').value = d.data.embedding.model || '';
        document.getElementById('embeddingBaseURL').value = d.data.embedding.base_url || '';
        document.getElementById('embeddingToken').value = d.data.embedding.token || '';
      }
    }
  } catch(e) {}
};

async function saveModelConfig(modelType) {
  let model, base_url, token;
  if (modelType === 1) {
    model = document.getElementById('chatModel').value.trim();
    base_url = document.getElementById('chatBaseURL').value.trim();
    token = document.getElementById('chatToken').value.trim();
  } else {
    model = document.getElementById('embeddingModel').value.trim();
    base_url = document.getElementById('embeddingBaseURL').value.trim();
    token = document.getElementById('embeddingToken').value.trim();
  }
  if (!model || !token) { showToast('请填写 Model 和 Token'); return; }

  try {
    const r = await authFetch(apiBase + '/user/model', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model_type: modelType, model, base_url, token })
    });
    const d = await r.json();
    if (d.code === 0) { showToast('保存成功'); }
    else { showToast(d.message || '保存失败'); }
  } catch(e) {}
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}
</script>
</body>
</html>
