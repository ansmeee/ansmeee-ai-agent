<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - AI Agent</title>
<style>
  :root {
    --bg: #f5f5f7; --surface: #ffffff; --accent: #2563eb; --accent-hover: #1d4ed8;
    --text: #1e1e2e; --text-secondary: #6b7280; --border: #e5e7eb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 36px; width: 380px; box-shadow: 0 4px 16px rgba(0,0,0,.06);
  }
  h2 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .sub { font-size: 13px; color: var(--text-secondary); text-align: center; margin-bottom: 24px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
  .form-group label { font-size: 13px; color: var(--text-secondary); }
  .form-group input { font-size: 14px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; outline: none; }
  .form-group input:focus { border-color: var(--accent); }
  .btn { width: 100%; font-size: 15px; padding: 12px; border-radius: 10px; cursor: pointer; border: none; font-weight: 600; margin-top: 8px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .switch { text-align: center; margin-top: 14px; font-size: 13px; color: var(--text-secondary); }
  .switch a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .switch a:hover { text-decoration: underline; }
  .error { color: #dc2626; font-size: 13px; margin-top: 8px; text-align: center; display: none; }
</style>
</head>
<body>

<div class="card">
  <h2 id="formTitle">登录</h2>
  <div class="sub" id="formSub">欢迎使用 AI Agent</div>

  <div class="form-group" id="emailGroup" style="display:none">
    <label>邮箱</label>
    <input id="email" type="email" placeholder="your@email.com">
  </div>
  <div class="form-group">
    <label>邮箱</label>
    <input id="loginEmail" type="email" placeholder="your@email.com">
  </div>
  <div class="form-group">
    <label>密码</label>
    <input id="password" type="password" placeholder="至少6位">
  </div>

  <div class="error" id="errorMsg"></div>
  <button class="btn btn-primary" id="submitBtn" onclick="doSubmit()">登录</button>

  <div class="switch">
    <span id="switchText">没有账号？</span>
    <a id="switchLink" onclick="toggleMode()">注册</a>
  </div>
</div>

<script>
let mode = 'login';
const apiBase = '/api/v1';

function toggleMode() {
  mode = mode === 'login' ? 'register' : 'login';
  document.getElementById('formTitle').textContent = mode === 'login' ? '登录' : '注册';
  document.getElementById('submitBtn').textContent = mode === 'login' ? '登录' : '注册';
  document.getElementById('switchText').textContent = mode === 'login' ? '没有账号？' : '已有账号？';
  document.getElementById('switchLink').textContent = mode === 'login' ? '注册' : '登录';
  hideError();
}

async function doSubmit() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('password').value.trim();
  if (!email || !password) { showError('请填写邮箱和密码'); return; }
  if (password.length < 6) { showError('密码至少6位'); return; }

  const url = mode === 'login' ? '/auth/login' : '/auth/register';
  const r = await fetch(apiBase + url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  const d = await r.json();
  if (d.code === 0) {
    localStorage.setItem('token', d.data.token);
    localStorage.setItem('user_id', d.data.user_id);
    localStorage.setItem('email', d.data.email);
    window.location.href = '/';
  } else {
    showError(d.message || '操作失败');
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

// Check if already logged in — verify token is valid before redirecting.
const existingToken = localStorage.getItem('token');
if (existingToken) {
  fetch(apiBase + '/auth/me', {
    headers: { 'Authorization': 'Bearer ' + existingToken }
  }).then(r => {
    if (r.ok) {
      window.location.replace('/');
    } else {
      localStorage.removeItem('token');
      localStorage.removeItem('user_id');
      localStorage.removeItem('email');
    }
  }).catch(() => {});
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSubmit();
});
</script>
</body>
</html>
