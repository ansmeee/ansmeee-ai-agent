<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent 管理</title>
<style>
  :root {
    --bg: #f5f5f7; --surface: #ffffff; --accent: #2563eb; --accent-hover: #1d4ed8;
    --text: #1e1e2e; --text-secondary: #6b7280; --border: #e5e7eb;
    --shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-inner { max-width: 1024px; width: 100%; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 18px; font-weight: 700; }
  .topbar .actions { display: flex; gap: 10px; align-items: center; }
  .btn { font-size: 13px; padding: 8px 18px; border-radius: 8px; cursor: pointer; border: none; font-weight: 500; transition: background .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .content { max-width: 1024px; margin: 0 auto; padding: 48px 24px 24px; }

  /* middle chat input */
  .chat-quick { margin-bottom: 32px; }
  .chat-quick .label { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
  .chat-quick .input-row { display: flex; position: relative; }
  .chat-quick textarea {
    width: 100%; background: var(--surface); color: var(--text); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 54px 12px 16px; font-size: 14px; overflow-y: auto; outline: none;
    font-family: inherit; line-height: 1.5; min-height: 200px; max-height: 264px;
    transition: border-color .15s;
  }
  .chat-quick textarea:focus { border-color: var(--accent); }
  .chat-quick button {
    position: absolute; right: 8px; bottom: 8px;
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    width: 36px; height: 36px; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .chat-quick button:hover { background: var(--accent-hover); }

  /* section title */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 12px; }
  .section-title { font-size: 14px; font-weight: 600; color: var(--text-secondary); flex-shrink: 0; }
  .section-search { flex: 1; max-width: 240px; }
  .section-search input { width: 100%; font-size: 13px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; outline: none; line-height: 1.4; }
  .section-search input:focus { border-color: var(--accent); }

  .agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; box-shadow: var(--shadow); cursor: pointer; transition: box-shadow .15s;
    display: flex; flex-direction: column; gap: 10px;
  }
  .card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); }
  .card .title { font-size: 16px; font-weight: 600; }
  .card .desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card .meta { font-size: 11px; color: var(--text-secondary); display: flex; justify-content: space-between; }
  .card .card-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .card .card-actions button { font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); }
  .card .card-actions .btn-edit:hover { border-color: var(--accent); color: var(--accent); }
  .card .card-actions .btn-delete:hover { border-color: #dc2626; color: #dc2626; }
  .empty { text-align: center; padding: 40px 0; color: var(--text-secondary); }
  .empty .icon { font-size: 40px; margin-bottom: 8px; }

  /* modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 100; justify-content: center; align-items: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--surface); border-radius: 14px; padding: 28px; width: 480px; max-width: 90vw; box-shadow: 0 12px 40px rgba(0,0,0,.12); display: flex; flex-direction: column; gap: 16px; }
  .modal h3 { font-size: 18px; font-weight: 600; }
  .modal label { font-size: 13px; color: var(--text-secondary); display: flex; flex-direction: column; gap: 4px; }
  .modal input, .modal textarea { font-size: 14px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; outline: none; font-family: inherit; resize: vertical; }
  .modal textarea { min-height: 100px; }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btns button { font-size: 13px; padding: 8px 18px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); font-weight: 500; }
  .btn-cancel { background: var(--surface); }
  .btn-save { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-outline { font-size: 13px; padding: 6px 14px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); font-weight: 500; }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <h1>Agent 管理</h1>
    <div class="actions" id="userMenu" style="display:flex;align-items:center;gap:8px;">
      <a href="/login" class="btn-outline" id="loginBtn" style="text-decoration:none;">登录</a>
      <div id="userAvatar" style="display:none;position:relative;">
        <div id="avatarBtn" style="width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer;"></div>
        <div id="userDropdown" style="display:none;position:absolute;top:38px;right:0;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);min-width:120px;z-index:50;">
          <a href="/user" style="display:block;padding:8px 14px;font-size:13px;color:var(--text);text-decoration:none;">用户中心</a>
          <div onclick="logout()" style="display:block;padding:8px 14px;font-size:13px;color:#dc2626;cursor:pointer;">退出登录</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="content">
  <!-- middle: quick chat -->
  <div class="chat-quick">
    <div class="label">向 <strong id="defaultAgentName">默认助手</strong> 提问</div>
    <div class="input-row">
      <textarea id="quickInput" rows="2" placeholder="输入消息，Enter 发送，Shift+Enter 换行" oninput="autoResize(this)" onkeydown="onQuickKey(event)"></textarea>
      <button onclick="quickChat()" title="发送">↑</button>
    </div>
  </div>

  <!-- bottom: agent cards -->
  <div class="section-header">
    <span class="section-title">我的智能体</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <button onclick="openCreate()" style="font-size:13px;padding:6px 14px;border-radius:8px;cursor:pointer;border:none;font-weight:500;background:var(--accent);color:#fff;white-space:nowrap;">+ 新增</button>
      <span class="section-search"><input type="text" id="searchInput" placeholder="搜索智能体..." oninput="filterAgents()"></span>
    </div>
  </div>
  <div class="agent-grid" id="agentGrid"></div>
  <div class="empty" id="empty"><div class="icon">🤖</div><p>暂无自定义 Agent，点击上方按钮创建</p></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle">新增 Agent</h3>
    <label>名称 <input id="agentTitle" maxlength="50" placeholder="Agent 名称"></label>
    <label>描述 <input id="agentDesc" maxlength="200" placeholder="简短描述此 Agent 的功能"></label>
    <label>Prompt <textarea id="agentPrompt" placeholder="系统提示词，定义 Agent 的行为和角色"></textarea></label>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" id="saveBtn" onclick="saveAgent()">保存</button>
    </div>
  </div>
</div>

<script>
const apiBase = '/api/v1';
const token = localStorage.getItem('token') || '';
const userEmail = localStorage.getItem('email') || '';

function updateUserMenu() {
  if (token && userEmail) {
    document.getElementById('loginBtn').style.display = 'none';
    document.getElementById('userAvatar').style.display = 'block';
    document.getElementById('avatarBtn').textContent = userEmail.charAt(0).toUpperCase();
  } else {
    document.getElementById('loginBtn').style.display = 'inline-block';
    document.getElementById('userAvatar').style.display = 'none';
  }
}

document.getElementById('avatarBtn').addEventListener('click', e => {
  e.stopPropagation();
  const dd = document.getElementById('userDropdown');
  dd.style.display = dd.style.display === 'block' ? 'none' : 'block';
});

document.addEventListener('click', () => {
  document.getElementById('userDropdown').style.display = 'none';
});

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('user_id');
  localStorage.removeItem('email');
  window.location.href = '/login';
}

updateUserMenu();
if (!token) { window.location.href = '/login'; }

const authHeaders = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

async function authFetch(url, opts = {}) {
  opts.headers = { ...authHeaders, ...(opts.headers || {}) };
  const r = await fetch(url, opts);
  if (r.status === 401) { window.location.href = '/login'; }
  return r;
}

let editingId = null;
let defaultAgentId = '';
let allAgents = [];

window.onload = async () => {
  await loadAgents();
  document.getElementById('quickInput').focus();
};

document.getElementById('agentGrid').addEventListener('click', e => {
  const btn = e.target.closest('button');
  const card = e.target.closest('.card');
  const el = btn || card;
  if (!el || !el.dataset.action) return;
  const action = el.dataset.action;
  const id = el.dataset.id;
  if (action === 'chat') startChat(id);
  else if (action === 'edit') openEdit(id, el.dataset.title, el.dataset.desc, el.dataset.prompt);
  else if (action === 'delete') delAgent(id, el.dataset.title);
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 264) + 'px';
}

function onQuickKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    quickChat();
  }
}

async function quickChat() {
  const msg = document.getElementById('quickInput').value.trim();
  if (!msg) return;
  window.location.href = `/chat?agent_id=${defaultAgentId}&msg=${encodeURIComponent(msg)}`;
}

async function loadAgents() {
  try {
    const r = await authFetch(apiBase + '/agents');
    const d = await r.json();
    allAgents = d.data?.agents || [];
    if (allAgents.length > 0) {
      defaultAgentId = allAgents[0].id;
      document.getElementById('defaultAgentName').textContent = allAgents[0].title;
    }
    renderAgents();
  } catch(e) { console.error(e); }
}

function openCreate() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '新增 Agent';
  document.getElementById('agentTitle').value = '';
  document.getElementById('agentDesc').value = '';
  document.getElementById('agentPrompt').value = '';
  document.getElementById('modal').classList.add('show');
}

function openEdit(id, title, desc, prompt) {
  editingId = id;
  document.getElementById('modalTitle').textContent = '编辑 Agent';
  document.getElementById('agentTitle').value = title;
  document.getElementById('agentDesc').value = desc;
  document.getElementById('agentPrompt').value = prompt;
  document.getElementById('modal').classList.add('show');
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

async function saveAgent() {
  const title = document.getElementById('agentTitle').value.trim();
  const description = document.getElementById('agentDesc').value.trim();
  const prompt = document.getElementById('agentPrompt').value.trim();
  if (!title || !prompt) { alert('请填写名称和 Prompt'); return; }

  const method = editingId ? 'PUT' : 'POST';
  const url = editingId ? `${apiBase}/agents/${editingId}` : `${apiBase}/agents`;
  const r = await authFetch(url, {
    method, headers: authHeaders,
    body: JSON.stringify({ title, description, prompt })
  });
  const d = await r.json();
  if (d.code === 0) { closeModal(); loadAgents(); }
  else { alert(d.message || '操作失败'); }
}

async function delAgent(id, title) {
  if (!confirm(`确认删除 "${title}"？`)) return;
  const r = await authFetch(`${apiBase}/agents/${id}`, { method: 'DELETE' });
  const d = await r.json();
  if (d.code === 0 || d.data?.deleted) { loadAgents(); }
  else { alert(d.message || '删除失败'); }
}

function filterAgents() {
  renderAgents();
}

function renderAgents() {
  const kw = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  const agents = kw ? allAgents.filter(a =>
    a.title.toLowerCase().includes(kw) || (a.description || '').toLowerCase().includes(kw)
  ) : allAgents;

  const grid = document.getElementById('agentGrid');
  const empty = document.getElementById('empty');
  if (agents.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    empty.querySelector('p').textContent = kw ? '未找到匹配的智能体' : '暂无 Agent';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = agents.map(a => `
    <div class="card" data-action="chat" data-id="${a.id}">
      <div class="title">${esc(a.title)}</div>
      <div class="desc">${esc(a.description || '暂无描述')}</div>
      <div class="meta">
        <span>ID: ${a.id.slice(0, 8)}</span>
        <span>更新: ${fmtDate(a.updated_at)}</span>
      </div>
      <div class="card-actions">
        <button class="btn-edit" data-action="edit" data-id="${a.id}" data-title="${escAttr(a.title)}" data-desc="${escAttr(a.description||'')}" data-prompt="${escAttr(a.prompt||'')}">编辑</button>
        <button class="btn-delete" data-action="delete" data-id="${a.id}" data-title="${escAttr(a.title)}">删除</button>
      </div>
    </div>
  `).join('');
}

function startChat(agentId) { window.location.href = `/chat?agent_id=${agentId}`; }

function esc(s) { const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }
function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(s) { if (!s) return ''; return new Date(s).toLocaleDateString(); }
</script>
</body>
</html>
