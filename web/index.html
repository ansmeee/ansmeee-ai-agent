<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Chat</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --text: #1e1e2e;
    --text-secondary: #6b7280;
    --border: #e5e7eb;
    --shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    justify-content: center;
  }
  .app {
    width: 1024px; height: 100vh; display: flex;
    box-shadow: 0 0 0 1px var(--border); overflow: hidden;
  }

  /* ——— session sidebar ——— */
  .main-layout { display: flex; flex: 1; overflow: hidden; }
  aside {
    width: 240px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  aside .sidebar-header { font-size: 12px; font-weight: 600; color: var(--text-secondary); padding: 10px 14px 6px; flex-shrink: 0; }
  aside .session-list { flex: 1; overflow-y: auto; padding: 4px 6px 6px; }
  aside .session-item {
    padding: 6px 10px; border-radius: 6px; cursor: pointer; display: flex;
    align-items: center; gap: 6px; margin-bottom: 1px; transition: background .1s;
  }
  aside .session-item:hover { background: var(--bg); }
  aside .session-item.active { background: #eef2ff; }
  aside .session-item .item-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
  aside .session-item .session-title { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  aside .session-item .session-meta { font-size: 10px; color: var(--text-secondary); }
  aside .session-item .del-btn {
    visibility: hidden; border: none; background: none; color: #9ca3af;
    cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px; flex-shrink: 0;
  }
  aside .session-item:hover .del-btn { visibility: visible; }
  aside .session-item .del-btn:hover { color: #dc2626; }
  aside .empty-history { font-size: 12px; color: var(--text-secondary); padding: 10px; text-align: center; }
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ——— right chat panel ——— */
  .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-panel header {
    background: var(--surface); padding: 0 24px; height: 52px;
    display: flex; align-items: center; gap: 16px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .chat-panel header .back-btn { font-size: 15px; color: var(--text-secondary); text-decoration: none; flex-shrink: 0; }
  .chat-panel header .back-btn:hover { color: var(--accent); }
  #agentName { font-size: 18px; color: var(--text); font-weight: 700; }
  #conversationTitle { font-size: 14px; font-weight: 500; color: var(--text-secondary); flex: 1; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #agentSelect { display: none; }
  #newChatBtn { font-size: 13px; color: var(--accent); border: 1px solid var(--accent); background: none; padding: 5px 14px; border-radius: 8px; cursor: pointer; font-weight: 500; flex-shrink: 0; }
  #newChatBtn:hover { background: var(--accent); color: #fff; }
  .error-banner {
    background: #fef2f2; color: #dc2626; text-align: center; padding: 10px;
    font-size: 13px; display: none; border-bottom: 1px solid #fecaca; flex-shrink: 0;
  }
  .chat-area main {
    flex: 1; overflow-y: auto; padding: 20px 24px;
    display: flex; flex-direction: column; gap: 16px; background: var(--surface);
  }
  /* ——— messages ——— */
  .msg { display: flex; flex-direction: column; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .msg.tool { align-self: flex-start; max-width: 60%; }
  .msg .role { font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; padding: 0 2px; }
  .msg .bubble {
    padding: 10px 16px; border-radius: 16px; line-height: 1.55; font-size: 14px;
    white-space: pre-wrap; word-break: break-word; box-shadow: var(--shadow);
  }
  .msg.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 6px; }
  .msg.assistant .bubble { background: none; border: none; box-shadow: none; padding: 0; border-radius: 0; }
  .msg.tool .bubble { background: #fefce8; border: 1px solid #fde68a; border-bottom-left-radius: 6px; font-size: 12px; color: var(--text-secondary); }
  .msg.streaming .bubble::after { content: '▊'; animation: blink 1s infinite; color: var(--accent); }
  @keyframes blink { 0%,50% { opacity:1; } 51%,100% { opacity:0; } }

  /* ——— input ——— */
  .chat-area footer {
    background: var(--surface); padding: 12px 16px;
    display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
  }
  footer .input-row { display: flex; gap: 0; position: relative; }
  footer textarea {
    width: 100%; background: var(--surface); color: var(--text); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 54px 12px 16px; font-size: 14px; overflow-y: auto; outline: none;
    font-family: inherit; line-height: 1.5; min-height: 100px; max-height: 132px;
    transition: border-color .15s;
  }
  footer textarea:focus { border-color: var(--accent); }
  footer button {
    position: absolute; right: 8px; bottom: 8px;
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    width: 36px; height: 36px; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s; flex-shrink: 0;
  }
  footer button:hover { background: var(--accent-hover); }
  footer button:disabled { opacity: .4; cursor: not-allowed; }

  .empty-state {
    flex: 1; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 10px; color: var(--text-secondary); text-align: center;
  }
  .empty-state .icon { font-size: 44px; opacity: .6; }
  .empty-state .hint { font-size: 14px; line-height: 1.6; }
  .tools-bar { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; padding: 4px 0; }
  .tools-bar .tag { background: #eef2ff; color: var(--accent); font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 500; }

  /* ——— markdown ——— */
  .bubble.md p { margin: 0 0 8px; }
  .bubble.md p:last-child { margin-bottom: 0; }
  .bubble.md ul, .bubble.md ol { margin: 0 0 8px; padding-left: 18px; }
  .bubble.md li { margin-bottom: 2px; }
  .bubble.md h1, .bubble.md h2, .bubble.md h3, .bubble.md h4 { margin: 12px 0 6px; line-height: 1.3; }
  .bubble.md h1 { font-size: 1.3em; } .bubble.md h2 { font-size: 1.15em; } .bubble.md h3 { font-size: 1.05em; }
  .bubble.md pre {
    background: #1e1e2e; color: #e2e8f0; border-radius: 8px; padding: 12px 14px;
    margin: 8px 0; overflow-x: auto; font-size: 13px; line-height: 1.5;
  }
  .bubble.md code {
    background: #f1f5f9; color: #c7254e; padding: 2px 5px; border-radius: 4px;
    font-size: .9em; font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
  }
  .bubble.md pre code { background: none; color: inherit; padding: 0; font-size: inherit; }
  .bubble.md blockquote {
    border-left: 3px solid var(--accent); padding: 4px 12px; margin: 8px 0;
    color: var(--text-secondary); background: #f8fafc; border-radius: 0 6px 6px 0;
  }
  .bubble.md a { color: var(--accent); }
  .bubble.md table { border-collapse: collapse; margin: 8px 0; font-size: 13px; }
  .bubble.md th, .bubble.md td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .bubble.md th { background: #f8fafc; font-weight: 600; }
  .bubble.md hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .msg.user .bubble.md code { background: rgba(255,255,255,.2); color: #fff; }
  .msg.user .bubble.md a { color: #fff; text-decoration: underline; }

  /* ——— modal ——— */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3);
    z-index: 100; justify-content: center; align-items: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border-radius: 14px; padding: 24px;
    width: 420px; max-width: 90vw; box-shadow: 0 12px 40px rgba(0,0,0,.12);
    display: flex; flex-direction: column; gap: 16px;
  }
  .modal h3 { font-size: 17px; font-weight: 600; }
  .modal label { font-size: 13px; color: var(--text-secondary); display: flex; flex-direction: column; gap: 4px; }
  .modal input, .modal textarea {
    font-size: 14px; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 8px; outline: none; font-family: inherit; resize: vertical;
  }
  .modal textarea { min-height: 80px; }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btns button {
    font-size: 13px; padding: 8px 18px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--border); font-weight: 500;
  }
  .modal-btns .btn-cancel { background: var(--surface); }
  .modal-btns .btn-save { background: var(--accent); color: #fff; border-color: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <!-- left: history -->
  <!-- right: chat window -->
  <div class="chat-panel">
    <header>
      <a href="/agents" class="back-btn">←</a>
      <span id="agentName"></span>
      <span id="conversationTitle">新的对话</span>
      <button id="newChatBtn" onclick="newSession()">+ 新会话</button>
      <div id="userMenu" style="display:flex;align-items:center;gap:8px;">
        <a href="/login" id="loginBtn" style="text-decoration:none;font-size:13px;color:var(--accent);flex-shrink:0;">登录</a>
        <div id="userAvatar" style="display:none;position:relative;flex-shrink:0;">
          <div id="avatarBtn" style="width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer;"></div>
          <div id="userDropdown" style="display:none;position:absolute;top:38px;right:0;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);min-width:120px;z-index:50;">
            <a href="/user" style="display:block;padding:8px 14px;font-size:13px;color:var(--text);text-decoration:none;">用户中心</a>
            <div onclick="logout()" style="display:block;padding:8px 14px;font-size:13px;color:#dc2626;cursor:pointer;">退出登录</div>
          </div>
        </div>
      </div>
      <select id="agentSelect" onchange="onAgentChange()"></select>
    </header>

    <div class="main-layout">
      <aside>
        <div class="sidebar-header">历史会话</div>
        <div class="session-list" id="sessionList">
          <div class="empty-history">暂无历史会话</div>
        </div>
      </aside>

      <div class="chat-area">
        <div class="error-banner" id="errorBanner"></div>

        <main id="messages">
          <div class="empty-state">
            <div class="icon">🤖</div>
            <div class="hint">开始新的对话</div>
            <div class="tools-bar" id="toolsBar"></div>
          </div>
        </main>

        <footer>
          <div class="input-row">
            <textarea id="input" rows="2" placeholder="输入消息，Enter 发送，Shift+Enter 换行" oninput="autoResize(this)"></textarea>
            <button id="sendBtn" onclick="send()" title="发送">↑</button>
          </div>
        </footer>
      </div>
    </div>
  </div>
</div>

<script>
const apiBase = '/api/v1';
const token = localStorage.getItem('token') || '';
const userEmail = localStorage.getItem('email') || '';

function updateUserMenu() {
  if (token && userEmail) {
    document.getElementById('loginBtn').style.display = 'none';
    document.getElementById('userAvatar').style.display = 'block';
    document.getElementById('avatarBtn').textContent = userEmail.charAt(0).toUpperCase();
  }
}
updateUserMenu();
if (!token) { window.location.href = '/login'; }

document.getElementById('avatarBtn').addEventListener('click', e => {
  e.stopPropagation();
  const dd = document.getElementById('userDropdown');
  dd.style.display = dd.style.display === 'block' ? 'none' : 'block';
});
document.addEventListener('click', () => { document.getElementById('userDropdown').style.display = 'none'; });
function logout() {
  localStorage.removeItem('token'); localStorage.removeItem('user_id'); localStorage.removeItem('email');
  window.location.href = '/login';
}

const authHeaders = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

async function authFetch(url, opts = {}) {
  opts.headers = { ...authHeaders, ...(opts.headers || {}) };
  const r = await fetch(url, opts);
  if (r.status === 401) { window.location.href = '/login'; }
  return r;
}

let sessionId = '';
let activeAgentId = '';
let streamingMsgEl = null;

function updateURL(id) {
  const url = new URL(window.location);
  if (id) { url.searchParams.set('session', id); }
  else { url.searchParams.delete('session'); }
  history.replaceState(null, '', url);
}

window.onload = async () => {
  if (typeof marked !== 'undefined') {
    marked.setOptions({ breaks: false, gfm: true });
  }
  document.getElementById('input').focus();

  const params = new URLSearchParams(window.location.search);
  const aid = params.get('agent_id');
  if (aid) {
    activeAgentId = aid;
  }

  await loadAgents(!!aid);
  if (aid) {
    document.getElementById('agentSelect').value = aid;
    updateAgentName();
  }
  loadTools();
  loadSessions();

  const sid = params.get('session');
  if (sid) {
    await switchSession(sid);
  }

  const msg = params.get('msg');
  if (msg) {
    document.getElementById('input').value = msg;
    autoResize(document.getElementById('input'));
    send();
  }

  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  document.getElementById('sessionId').addEventListener('click', () => {
    if (sessionId) navigator.clipboard.writeText(sessionId);
  });
};

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 132) + 'px';
}

async function loadAgents(preserveSelection) {
  try {
    const r = await authFetch(apiBase + '/agents');
    const d = await r.json();
    const agents = d.data?.agents || [];
    // Populate hidden select for agent switching.
    const select = document.getElementById('agentSelect');
    select.innerHTML = agents.map(a => `<option value="${a.id}">${escapeHtml(a.title)}</option>`).join('');

    if (preserveSelection && activeAgentId && agents.some(a => a.id === activeAgentId)) {
      select.value = activeAgentId;
    } else if (agents.length > 0 && !preserveSelection) {
      activeAgentId = agents[0].id;
      select.value = activeAgentId;
    }
    updateAgentName();
  } catch(e) {}
}

function updateAgentName() {
  const select = document.getElementById('agentSelect');
  const name = select.selectedOptions[0]?.text || '默认助手';
  document.getElementById('agentName').textContent = name;
}

function onAgentChange() {
  activeAgentId = document.getElementById('agentSelect').value;
  updateAgentName();
}

function openAgentSwitcher() {
  // Show the hidden select temporarily as a simple switcher.
  const select = document.getElementById('agentSelect');
  select.style.display = 'block';
  select.style.position = 'absolute';
  select.focus();
  select.onblur = () => {
    select.style.display = 'none';
    onAgentChange();
  };
  select.onchange = () => {
    select.style.display = 'none';
    onAgentChange();
    select.onblur = null;
  };
}

function openAgentModal() {
  document.getElementById('agentTitle').value = '';
  document.getElementById('agentDesc').value = '';
  document.getElementById('agentPrompt').value = '';
  document.getElementById('agentModal').classList.add('show');
  document.getElementById('agentTitle').focus();
}

function closeAgentModal() {
  document.getElementById('agentModal').classList.remove('show');
}

async function createAgent() {
  const title = document.getElementById('agentTitle').value.trim();
  const description = document.getElementById('agentDesc').value.trim();
  const prompt = document.getElementById('agentPrompt').value.trim();
  if (!title || !prompt) { alert('请填写标题和 Prompt'); return; }

  try {
    const r = await authFetch(apiBase + '/agents', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, description, prompt })
    });
    const d = await r.json();
    if (d.code === 0 && d.data) {
      activeAgentId = d.data.id;
      closeAgentModal();
      await loadAgents(true);
      document.getElementById('agentSelect').value = activeAgentId;
      updateAgentName();
    } else {
      alert(d.message || '创建失败');
    }
  } catch(e) {
    alert('网络错误');
  }
}

async function loadSessions() {
  try {
    const params = new URLSearchParams();
    if (activeAgentId) params.set('agent_id', activeAgentId);
    const r = await authFetch(apiBase + '/sessions?' + params.toString());
    const d = await r.json();
    const list = document.getElementById('sessionList');
    const sessions = d.data?.sessions || [];
    if (sessions.length === 0) {
      list.innerHTML = '<div class="empty-history">暂无历史会话</div>';
      return;
    }
    list.innerHTML = sessions.map(s => {
      const title = s.title || '(空会话)';
      const active = s.id === sessionId ? ' active' : '';
      const agentAttr = s.agent_id ? ` data-agent-id="${s.agent_id}"` : '';
      return `<div class="session-item${active}" data-id="${s.id}"${agentAttr} onclick="switchSession('${s.id}')">
        <div class="item-content">
          <div class="session-title">${escapeHtml(title)}</div>
          <div class="session-meta">${s.id.slice(0, 8)}</div>
        </div>
        <button class="del-btn" onclick="deleteSession(event, '${s.id}')" title="删除">×</button>
      </div>`;
    }).join('');
  } catch(e) {}
}

async function switchSession(id) {
  sessionId = id;
  updateURL(id);

  const main = document.getElementById('messages');
  main.innerHTML = '';

  let title = '历史对话';
  try {
    const r = await authFetch(`${apiBase}/chat/${id}`);
    const d = await r.json();
    if (d.code === 0 && d.data?.messages) {
      for (const m of d.data.messages) {
        addMessage(m.role, m.content);
      }
      const firstUser = d.data.messages.find(m => m.role === 'user');
      if (firstUser) title = firstUser.content.slice(0, 30) + (firstUser.content.length > 30 ? '...' : '');
    }
  } catch(e) {
    showError('加载会话失败');
  }

  // Restore agent from session info.
  const itemEl = document.querySelector(`.session-item[data-id="${id}"]`);
  const agentId = itemEl?.dataset?.agentId;
  if (agentId) {
    activeAgentId = agentId;
    document.getElementById('agentSelect').value = agentId;
    updateAgentName();
  }

  document.getElementById('conversationTitle').textContent = title;
  document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
  if (itemEl) itemEl.classList.add('active');
}

async function newSession() {
  sessionId = '';
  updateURL('');
  document.getElementById('conversationTitle').textContent = '新的对话';
  document.getElementById('messages').innerHTML = '<div class="empty-state"><div class="icon">🤖</div><div class="hint">开始新的对话</div><div class="tools-bar" id="toolsBar"></div></div>';
  document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
  loadTools();

  // Create session on server.
  try {
    const r = await authFetch(apiBase + '/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent_id: activeAgentId })
    });
    const d = await r.json();
    if (d.data?.session_id) {
      sessionId = d.data.session_id;
      updateURL(sessionId);
    }
  } catch(e) {}
}

async function deleteSession(e, id) {
  e.stopPropagation();
  if (!confirm('确认删除此会话？')) return;
  try { await authFetch(`${apiBase}/chat/${id}`, { method: 'DELETE' }); } catch(err) {}
  if (id === sessionId) newSession();
  loadSessions();
}

async function loadTools() {
  try {
    const r = await authFetch(apiBase + '/tools');
    const d = await r.json();
    const bar = document.getElementById('toolsBar');
    if (d.data?.tools?.length) {
      bar.innerHTML = d.data.tools.map(t => `<span class="tag">${t.name}</span>`).join('');
    }
  } catch(e) {}
}

function clearEmpty() {
  const empty = document.querySelector('.empty-state');
  if (empty) empty.remove();
}

async function send() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = '';
  input.style.height = 'auto';
  clearEmpty();

  // Lazy-create session on first message.
  if (!sessionId) {
    try {
      const r = await authFetch(apiBase + '/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ agent_id: activeAgentId })
      });
      const d = await r.json();
      if (d.data?.session_id) {
        sessionId = d.data.session_id;
        updateURL(sessionId);
        loadSessions();
      }
    } catch(e) {}
  }

  addMessage('user', msg);
  if (!sessionId) {
    return;
  }
  if (!document.getElementById('conversationTitle').textContent || document.getElementById('conversationTitle').textContent === '新的对话') {
    document.getElementById('conversationTitle').textContent = msg.slice(0, 30) + (msg.length > 30 ? '...' : '');
  }
  hideError();
  await sendStream(msg);
}

async function sendStream(msg) {
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  const main = document.getElementById('messages');
  const el = addAssistantPlaceholder('');
  streamingMsgEl = el;
  el.classList.add('streaming');
  const bubble = el.querySelector('.bubble');
  let fullText = '';
  let streamErr = null;

  try {
    const r = await authFetch(apiBase + '/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message: msg, agent_id: activeAgentId })
    });

    if (!r.ok) {
      const d = await r.json();
      showError(d.message || '请求失败');
      el.remove();
      btn.disabled = false;
      return;
    }

    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    function dispatchEvent(event, data) {
      switch (event) {
        case 'session':
          sessionId = data;
          updateURL(sessionId);
          break;
        case 'chunk':
          fullText += data;
          bubble.innerHTML = typeof marked !== 'undefined' ? marked.parse(fullText.replace(/\n{3,}/g, '\n\n')) : escapeHtml(fullText);
          main.scrollTop = main.scrollHeight;
          break;
        case 'done':
          console.log('[SSE] stream done, data:', data);
          try {
            const d = JSON.parse(data);
            if (d.session_id) {
              sessionId = d.session_id;
              updateURL(d.session_id);
            }
          } catch(e) {}
          loadSessions();
          break;
        case 'error':
          console.error('[SSE] stream error:', data);
          streamErr = data;
          break;
      }
    }

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      const lines = buf.split('\n');
      buf = lines.pop() || '';

      let event = 'message';
      let dataBuf = [];
      for (const line of lines) {
        if (line === '') {
          if (dataBuf.length > 0) { dispatchEvent(event, dataBuf.join('\n')); dataBuf = []; }
          event = 'message';
          continue;
        }
        if (line.startsWith('event: ')) {
          if (dataBuf.length > 0) { dispatchEvent(event, dataBuf.join('\n')); dataBuf = []; }
          event = line.slice(7).trim();
          continue;
        }
        if (line.startsWith('data: ')) { dataBuf.push(line.slice(6)); }
      }
      if (dataBuf.length > 0) { dispatchEvent(event, dataBuf.join('\n')); dataBuf = []; }
    }

    el.classList.remove('streaming');
    if (streamErr) { showError(streamErr); bubble.innerHTML = renderContent('assistant', fullText || '(响应错误)'); }
    if (!fullText && !streamErr) { bubble.innerHTML = '(空响应)'; }
    console.log('[SSE] final output:', fullText);
  } catch(e) {
    el.classList.remove('streaming');
    bubble.innerHTML = renderContent('assistant', fullText || '(连接中断)');
    showError('连接错误: ' + e.message);
  } finally {
    streamingMsgEl = null;
    btn.disabled = false;
  }
}

function renderContent(role, text) {
  if (role === 'assistant' && typeof marked !== 'undefined') {
    // Collapse 3+ consecutive newlines into 2 (one blank line).
    const cleaned = text.replace(/\n{3,}/g, '\n\n');
    return marked.parse(cleaned);
  }
  return escapeHtml(text);
}

function addMessage(role, text) {
  const main = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const roleLabel = role === 'user' ? 'You' : role === 'assistant' ? 'Assistant' : 'Tool';
  const bubbleClass = role === 'assistant' ? 'bubble md' : 'bubble';
  div.innerHTML = `<div class="role">${roleLabel}</div><div class="${bubbleClass}">${renderContent(role, text)}</div>`;
  main.appendChild(div);
  main.scrollTop = main.scrollHeight;
  return div;
}

function addAssistantPlaceholder(text) {
  const main = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  const content = text ? renderContent('assistant', text) : '';
  div.innerHTML = `<div class="role">Assistant</div><div class="bubble md">${content}</div>`;
  main.appendChild(div);
  main.scrollTop = main.scrollHeight;
  return div;
}

function escapeHtml(s) {
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

function showError(msg) {
  const banner = document.getElementById('errorBanner');
  banner.textContent = msg;
  banner.style.display = 'block';
  setTimeout(() => { banner.style.display = 'none'; }, 5000);
}

function hideError() { document.getElementById('errorBanner').style.display = 'none'; }
</script>
<div class="modal-overlay" id="agentModal">
  <div class="modal">
    <h3>新增智能体</h3>
    <label>标题
      <input id="agentTitle" placeholder="智能体名称" maxlength="50">
    </label>
    <label>描述
      <input id="agentDesc" placeholder="简短描述" maxlength="200">
    </label>
    <label>Prompt
      <textarea id="agentPrompt" placeholder="系统提示词"></textarea>
    </label>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAgentModal()">取消</button>
      <button class="btn-save" onclick="createAgent()">创建</button>
    </div>
  </div>
</div>
